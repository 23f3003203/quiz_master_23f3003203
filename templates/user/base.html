<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
          <a class="navbar-brand text-white" href="/">QuizMaster</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link active text-white hover" href="/">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-white hover" href="/score">Scores</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-white hover" href="/summary">Summary</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-white hover" href="/logout">Logout</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
              <button class="btn btn-outline-dark text-white" type="submit">Search</button>
            </form>
            <span class="ms-3">Welcome, User</span>
          </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

</body>
</html>

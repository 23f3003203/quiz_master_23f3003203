{% extends 'user/base.html' %}

{% block content %}

<div class="quiz-container mt-4 p-4">
    <!-- Header Section -->
    <div class="d-flex justify-content-between align-items-center">
        <span class="question-number">Q.No. <span id="current-question">3</span>/15</span>
        <span class="timer-box" id="timer">00:13:52</span>
    </div>

    <!-- Question Box -->
    <div class="question-box mt-3">
        .....Question Statement...
    </div>

    <!-- Options -->
    <div class="mt-3">
        <div class="form-check">
            <label class="option-label">
                <input class="form-check-input" type="radio" name="quiz-option" value="1">
                1) Option....
            </label>
        </div>
        <div class="form-check">
            <label class="option-label">
                <input class="form-check-input" type="radio" name="quiz-option" value="2">
                2) Option....
            </label>
        </div>
        <div class="form-check">
            <label class="option-label">
                <input class="form-check-input" type="radio" name="quiz-option" value="3" checked>
                3) Option....
            </label>
        </div>
        <div class="form-check">
            <label class="option-label">
                <input class="form-check-input" type="radio" name="quiz-option" value="4">
                4) Option....
            </label>
        </div>
    </div>

    <!-- Footer Buttons -->
    <div class="quiz-footer mt-4">
        <button class="btn btn-primary">Save and Next</button>
        <button class="btn btn-success">Submit</button>
    </div>
</div>

{% endblock %}

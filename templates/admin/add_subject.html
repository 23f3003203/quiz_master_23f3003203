<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Subject</title>

    <!-- Link to Local Bootstrap CSS -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}" />
</head>

<body class="bg-light d-flex align-items-center vh-100">
    <div class="container">
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=True) %}
        {% if messages %}
        <div class="mt-3">
            {% for category, message in messages %}
            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <div class="card shadow p-4 mx-auto w-50 w-md-75 w-sm-100">
            <h2 class="mb-4 text-center">New Subject</h2>
            <form action="/admin/add_subject" method="post">
                <div class="mb-3">
                    <label for="subject_id" class="form-label">Subject ID</label>
                    <input type="text" class="form-control" name="subject_id" id="subject_id" required>
                </div>

                <div class="mb-3">
                    <label for="subject_name" class="form-label">Subject Name</label>
                    <input type="text" class="form-control" name="subject_name" id="subject_name" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" name="description" id="description" rows="3"></textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a href="/admin/dashboard" class="btn btn-secondary">Go Back</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
